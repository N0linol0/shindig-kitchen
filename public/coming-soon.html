<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shindig Kitchen — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #FFFFFF; --ink: #1A1A18; --muted: #7A7468;
      --accent: #4A6741; --accent-dark: #2C3B28;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
    }
    html, body { height: 100%; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--ink);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }
    .logo {
      font-family: var(--font-display);
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 3rem;
      color: var(--ink);
    }
    .logo em { color: var(--accent); font-style: italic; }
    .leaf {
      font-size: 3rem;
      margin-bottom: 1.5rem;
      display: block;
    }
    h1 {
      font-family: var(--font-display);
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      font-weight: 600;
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 1.25rem;
    }
    h1 em { color: var(--accent); font-style: italic; }
    p {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.75;
      max-width: 420px;
      margin: 0 auto 2.5rem;
    }
    .form {
      display: flex;
      gap: 8px;
      max-width: 400px;
      width: 100%;
      margin: 0 auto;
    }
    .form input {
      flex: 1;
      font-family: var(--font-body);
      font-size: 0.95rem;
      color: var(--ink);
      background: #F0EEE9;
      border: none;
      border-radius: 4px;
      padding: 11px 16px;
      outline: none;
      transition: box-shadow 0.2s;
    }
    .form input:focus { box-shadow: 0 0 0 2px rgba(74,103,65,0.2); }
    .form input::placeholder { color: var(--muted); }
    .form button {
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 500;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 4px;
      padding: 11px 20px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .form button:hover { background: var(--accent-dark); }
    .thanks {
      display: none;
      font-size: 0.95rem;
      color: var(--accent);
      margin-top: 1rem;
    }
    .divider {
      width: 40px;
      height: 1px;
      background: #E0DDD8;
      margin: 3rem auto;
    }
    .social {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      align-items: center;
    }
    .social a { color: var(--muted); transition: color 0.2s; display: flex; }
    .social a:hover { color: var(--ink); }
    .social a svg { width: 20px; height: 20px; }
    .footer-note {
      margin-top: 4rem;
      font-size: 0.78rem;
      color: #C0BCB6;
    }
  </style>
</head>
<body>
  <div class="logo">Shindig<em>Kitchen</em></div>

  <span class="leaf">🌿</span>
  <h1>Something delicious<br>is <em>coming soon</em></h1>
  <p>Handcrafted recipes, canning guides, and small-batch preserves. We're putting the finishing touches on — enter your email and we'll let you know when we're ready.</p>

  <div class="form">
    <input type="email" id="cs-email" placeholder="your@email.com" onkeydown="if(event.key==='Enter')csSubscribe()" />
    <button onclick="csSubscribe()">Notify me</button>
  </div>
  <div class="thanks" id="cs-thanks">✓ You're on the list — we'll be in touch!</div>

  <div class="divider"></div>

  <div class="social">
    <a href="https://pinterest.com/shindigkitchen" target="_blank" title="Pinterest">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.373 0 0 5.373 0 12c0 5.084 3.163 9.426 7.627 11.174-.105-.949-.2-2.405.042-3.441.218-.937 1.407-5.965 1.407-5.965s-.359-.719-.359-1.782c0-1.668.967-2.914 2.171-2.914 1.023 0 1.518.769 1.518 1.69 0 1.029-.655 2.568-.994 3.995-.283 1.194.599 2.169 1.777 2.169 2.133 0 3.772-2.249 3.772-5.495 0-2.873-2.064-4.882-5.012-4.882-3.414 0-5.418 2.561-5.418 5.207 0 1.031.397 2.138.893 2.738a.36.36 0 0 1 .083.345l-.333 1.36c-.053.22-.174.267-.402.161-1.499-.698-2.436-2.889-2.436-4.649 0-3.785 2.75-7.262 7.929-7.262 4.163 0 7.398 2.967 7.398 6.931 0 4.136-2.607 7.464-6.227 7.464-1.216 0-2.359-.632-2.75-1.378l-.748 2.853c-.271 1.043-1.002 2.35-1.492 3.146C9.57 23.812 10.763 24 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0z"/></svg>
    </a>
    <a href="https://instagram.com/shindigkitchen" target="_blank" title="Instagram">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/></svg>
    </a>
    <a href="https://tiktok.com/@shindigkitchen" target="_blank" title="TikTok">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.19 8.19 0 0 0 4.78 1.52V6.75a4.85 4.85 0 0 1-1.01-.06z"/></svg>
    </a>
    <a href="https://twitter.com/shindigkitchen" target="_blank" title="Twitter / X">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
    </a>
  </div>

  <div class="footer-note">© 2026 Shindig Kitchen</div>

  <script>
    function csSubscribe() {
      const email = document.getElementById('cs-email').value.trim();
      if (!email || !email.includes('@')) return;
      fetch('/api/auth/coming-soon-subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      }).catch(() => {});
      document.querySelector('.form').style.display = 'none';
      document.getElementById('cs-thanks').style.display = 'block';
    }
  </script>
</body>
</html>
